name: Slack Health Check

# 9AM, 12PM, 3PM, 6PM, 9PM Eastern Time
# EDT (UTC-4, Mar–Nov): 13, 16, 19, 22, 01 UTC  ← active now
# EST (UTC-5, Nov–Mar): 14, 17, 20, 23, 02 UTC  ← update in November
on:
  schedule:
    - cron: '0 13 * * *'  # 9:00 AM EDT
    - cron: '0 16 * * *'  # 12:00 PM EDT
    - cron: '0 19 * * *'  # 3:00 PM EDT
    - cron: '0 22 * * *'  # 6:00 PM EDT
    - cron: '0 1 * * *'   # 9:00 PM EDT
  workflow_dispatch: {}   # Allow manual trigger from GitHub UI

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send health check notification
        run: |
          curl -f -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.PRODUCTION_URL }}/api/slack/health-check"
